<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote | Velox Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23FFCC00%22/><text x=%2250%22 y=%2270%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22%23D40000%22 font-weight=%22bold%22>V</text></svg>">
    <style>
        :root { --dhl-yellow: #FFCC00; --dhl-red: #D40000; --dhl-dark: #2c2c2c; --dhl-gray: #f2f2f2; --dhl-border: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Roboto', sans-serif; background: var(--white); color: #333; min-height: 100vh; display: flex; flex-direction: column; }
        a { text-decoration: none; color: inherit; cursor: pointer; }
        .top-bar { background: var(--dhl-yellow); padding: 8px 5%; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .main-nav { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--dhl-yellow); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--dhl-red); text-transform: uppercase; display: flex; align-items: center; cursor: pointer; }
        .logo span { color: var(--dhl-dark); background: var(--dhl-yellow); padding: 0 8px; margin-left: 2px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { font-weight: 700; font-size: 1rem; text-transform: uppercase; }
        .btn-start { background: var(--dhl-red); color: white; padding: 10px 20px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .menu-toggle { display: none; font-size: 1.8rem; cursor: pointer; }
        .mobile-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; opacity: 0; visibility: hidden; transition: 0.3s; }
        .mobile-menu-overlay.active { opacity: 1; visibility: visible; }
        .mobile-menu { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: var(--white); z-index: 9999; transition: 0.3s; border-right: 5px solid var(--dhl-yellow); overflow-y: auto; }
        .mobile-menu.active { left: 0; }
        .mobile-header { background: var(--dhl-red); color: white; padding: 20px; font-weight: 900; display: flex; justify-content: space-between; }
        .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .mobile-lang select { width: 100%; padding: 10px; background: var(--dhl-gray); }
        .hero { background: var(--dhl-dark); color: white; padding: 60px 5%; text-align: center; }
        .quote-form { max-width: 900px; margin: 40px auto; padding: 40px; background: white; border: 1px solid var(--dhl-border); border-radius: 4px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
        .btn-submit { background: var(--dhl-red); color: white; padding: 15px 30px; border: none; border-radius: 4px; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; }
        .btn-submit:hover { background: #b00000; }
        footer { background: var(--dhl-dark); color: #aaa; padding: 60px 5% 20px; margin-top: auto; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 40px; }
        .footer-col h4 { color: white; text-transform: uppercase; margin-bottom: 20px; }
        .footer-col ul { list-style: none; }
        .footer-col li { margin-bottom: 10px; }
        .footer-col a { color: #aaa; text-decoration: none; transition: 0.3s; }
        .footer-col a:hover { color: var(--dhl-yellow); }
        .copyright { text-align: center; border-top: 1px solid #444; padding-top: 20px; font-size: 0.8rem; }
        @media (max-width: 768px) { .nav-links, .btn-start { display: none; } .menu-toggle { display: block; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-left"><a href="index.html" data-i18n="back_home">Back to Home</a></div>
        <div class="top-right">
            <select class="country-select" onchange="changeLanguage()">
                <option value="en">🇬 EN</option><option value="ru">🇷 RU</option><option value="ch">🇨 CN</option><option value="de">🇩 DE</option><option value="fr">🇫 FR</option>
            </select>
            <a href="#" data-i18n="support">Support</a>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="main-nav">
        <div class="logo" onclick="window.location.href='index.html'">Velox<span>Logistics</span></div>
        <div class="nav-links">
            <a href="index.html" data-i18n="nav_home">Home</a>
            <a href="tracking.html" data-i18n="nav_track">Track</a>
            <a href="quote.html" class="btn-start" data-i18n="btn_start">Start Shipping</a>
        </div>
        <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu-overlay" id="menuOverlay" onclick="toggleMobileMenu()"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-header"><h3 data-i18n="mobile_title">Velox Logistics</h3><button class="close-btn" onclick="toggleMobileMenu()">✕</button></div>
        <div class="mobile-links">
            <a href="index.html" data-i18n="nav_home">Home</a>
            <a href="tracking.html" data-i18n="nav_track">Track</a>
            <a href="quote.html" data-i18n="btn_start">Start Shipping</a>
        </div>
        <div class="mobile-lang">
            <select id="mobileLanguageSelector" onchange="changeLanguageMobile()">
                <option value="en">English</option><option value="ru">Русский</option><option value="ch">中文</option><option value="de">Deutsch</option><option value="fr">Français</option>
            </select>
        </div>
    </div>

    <!-- Hero -->
    <section class="hero">
        <h1 data-i18n="quote_title">Get a Free Quote</h1>
        <p data-i18n="quote_sub">Estimate cost to share and compare.</p>
    </section>

    <!-- Quote Form -->
    <div class="quote-form">
        <form action="https://formspree.io/f/xnjodbjw" method="POST" onsubmit="submitQuote(event)">
            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="lbl_from">From Country</label>
                    <input type="text" name="from_country" required data-i18n-ph="ph_from">
                </div>
                <div class="form-group">
                    <label data-i18n="lbl_to">To Country</label>
                    <input type="text" name="to_country" required data-i18n-ph="ph_to">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="lbl_weight">Weight (kg)</label>
                    <input type="number" name="weight_kg" min="0.1" step="0.1" required data-i18n-ph="ph_weight">
                </div>
                <div class="form-group">
                    <label data-i18n="lbl_type">Service Type</label>
                    <select name="service_type">
                        <option value="Standard" data-i18n="opt_standard">Standard Ground</option>
                        <option value="Express" data-i18n="opt_express">Express Air</option>
                        <option value="Priority" data-i18n="opt_priority">International Priority</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label data-i18n="lbl_email">Your Email</label>
                <input type="email" name="email" required data-i18n-ph="ph_email">
            </div>
            <div class="form-group">
                <label data-i18n="lbl_phone">Phone Number</label>
                <input type="tel" name="phone" data-i18n-ph="ph_phone">
            </div>
            <div class="form-group">
                <label data-i18n="lbl_notes">Additional Notes</label>
                <textarea name="message" rows="4" data-i18n-ph="ph_notes"></textarea>
            </div>
            <button type="submit" class="btn-submit" data-i18n="btn_submit">Calculate & Send</button>
        </form>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-grid">
            <div class="footer-col">
                <h4 data-i18n="footer_quick">Quick Links</h4>
                <ul>
                    <li><a href="index.html" data-i18n="back_home">Back to Home</a></li>
                    <li><a href="locations.html" data-i18n="find_point">Find a Service Point</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer_support">Support</h4>
                <ul>
                    <li><a href="help-center.html" data-i18n="help_center">Help Center</a></li>
                </ul>
            </div>
        </div>
        <div class="copyright" data-i18n="copyright">&copy; 2024 Velox Logistics - all rights reserved</div>
    </footer>

    <script>
        // Mobile Menu Toggle
        function toggleMobileMenu() { 
            document.getElementById('mobileMenu').classList.toggle('active'); 
            document.getElementById('menuOverlay').classList.toggle('active'); 
        }
        
        // Language Switching
        function changeLanguage() { updateLanguage(document.querySelector('.country-select').value); }
        function changeLanguageMobile() { updateLanguage(document.getElementById('mobileLanguageSelector').value); }
        
        function updateLanguage(lang) {
            const t = translations[lang] || translations.en;
            // Update text content
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                if(t[el.getAttribute('data-i18n')]) el.textContent = t[el.getAttribute('data-i18n')]; 
            });
            // Update placeholders
            document.querySelectorAll('[data-i18n-ph]').forEach(el => { 
                if(t[el.getAttribute('data-i18n-ph')]) el.placeholder = t[el.getAttribute('data-i18n-ph')]; 
            });
        }

        // Form Submission Handler
        function submitQuote(e) {
            // Let Formspree handle the actual submission
            // Just show a translated success message after a delay
            const lang = document.querySelector('.country-select').value;
            const t = translations[lang] || translations.en;
            
            // Show success message (Formspree will still process the form)
            setTimeout(() => {
                alert(t.alert_sent || "Thank you! Your quote request has been sent. We'll contact you shortly.");
            }, 100);
        }

</body>
</html>
